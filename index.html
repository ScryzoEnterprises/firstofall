<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, user-scalable=no"
        />
        <title>▰ NEBULA MACHINA ▰ FUTURISTIC COSMIC CORE</title>
        <style>
            body {
                margin: 0;
                overflow: hidden;
                font-family:
                    "Segoe UI",
                    "Orbitron",
                    "Avenir Next",
                    system-ui,
                    -apple-system,
                    "Inter",
                    sans-serif;
                color: #eef5ff;
            }

            /* canvas 3D background */
            #cosmic-canvas {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                display: block;
                z-index: 0;
            }

            /* HUD / UI Overlay */
            .hud {
                position: absolute;
                z-index: 20;
                width: 100%;
                height: 100%;
                pointer-events: none;
            }

            /* голографические панели */
            .glass-panel {
                background: rgba(5, 15, 35, 0.55);
                backdrop-filter: blur(12px);
                border-radius: 28px;
                border: 1px solid rgba(0, 180, 255, 0.4);
                box-shadow:
                    0 20px 40px rgba(0, 0, 0, 0.4),
                    0 0 20px rgba(0, 160, 255, 0.2);
                pointer-events: auto;
            }

            .top-bar {
                position: absolute;
                top: 24px;
                left: 24px;
                right: 24px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                flex-wrap: wrap;
                gap: 14px;
                padding: 12px 28px;
                z-index: 30;
            }

            .logo-area h1 {
                font-size: 1.6rem;
                letter-spacing: 4px;
                font-weight: 500;
                background: linear-gradient(120deg, #fff, #70b8ff, #b87cff);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
                margin: 0;
            }

            .stats {
                display: flex;
                gap: 28px;
                font-size: 0.8rem;
                font-weight: 500;
                font-family: monospace;
            }

            .live-badge {
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .pulse-dot {
                width: 10px;
                height: 10px;
                background: #0f0;
                border-radius: 50%;
                box-shadow: 0 0 12px #0f0;
                animation: pulseLive 1.2s infinite;
            }

            @keyframes pulseLive {
                0% {
                    opacity: 0.4;
                    transform: scale(0.7);
                }
                100% {
                    opacity: 1;
                    transform: scale(1.2);
                }
            }

            /* главная панель управления */
            .control-nexus {
                position: absolute;
                bottom: 30px;
                left: 30px;
                right: 30px;
                display: flex;
                flex-wrap: wrap;
                gap: 20px;
                justify-content: space-between;
                align-items: flex-end;
                pointer-events: none;
            }

            .card {
                background: rgba(2, 10, 25, 0.7);
                backdrop-filter: blur(16px);
                border-radius: 28px;
                padding: 20px;
                border: 1px solid rgba(0, 200, 255, 0.35);
                pointer-events: auto;
                transition: 0.2s;
                min-width: 220px;
            }

            .card-title {
                font-size: 0.7rem;
                text-transform: uppercase;
                letter-spacing: 3px;
                margin-bottom: 10px;
                color: #90c0ff;
            }

            .big-number {
                font-size: 2rem;
                font-weight: 700;
                font-family: monospace;
            }

            button {
                background: linear-gradient(95deg, #0f2f55, #031a38);
                border: 1px solid #3a80bb;
                padding: 12px 26px;
                border-radius: 60px;
                color: white;
                font-weight: bold;
                cursor: pointer;
                backdrop-filter: blur(4px);
                transition: 0.2s;
                font-family: monospace;
            }

            button:hover {
                background: #1f4980;
                border-color: #7abfff;
                box-shadow: 0 0 15px #0080ff60;
            }

            .interactive-grid {
                display: flex;
                gap: 20px;
                flex-wrap: wrap;
                margin-top: 15px;
            }

            .status-led-group {
                display: flex;
                gap: 18px;
                margin-top: 12px;
            }

            .led {
                width: 12px;
                height: 12px;
                border-radius: 50%;
                background: #2ecc71;
                box-shadow: 0 0 8px #2ecc71;
            }

            input,
            textarea {
                background: #021c3a;
                border: 1px solid #2c6699;
                border-radius: 60px;
                padding: 8px 16px;
                color: white;
                width: 100%;
                margin-top: 8px;
            }

            canvas#audio-viz {
                width: 100%;
                height: 60px;
                border-radius: 16px;
                background: #03112a;
                margin-top: 12px;
            }

            @media (max-width: 800px) {
                .top-bar {
                    flex-direction: column;
                    align-items: stretch;
                }
                .stats {
                    justify-content: space-between;
                }
                .control-nexus {
                    flex-direction: column;
                    align-items: stretch;
                    bottom: 20px;
                    left: 20px;
                    right: 20px;
                    gap: 14px;
                }
            }
        </style>
    </head>
    <body>
        <canvas id="cosmic-canvas"></canvas>
        <div class="hud">
            <div class="top-bar glass-panel">
                <div class="logo-area">
                    <h1>NEBULA MACHINA</h1>
                    <div style="font-size: 9px; letter-spacing: 2px">
                        ✦ QUANTUM CORE v.∞ ✦
                    </div>
                </div>
                <div class="stats">
                    <div class="live-badge">
                        <div class="pulse-dot"></div>
                        LIVE STREAM
                    </div>
                    <div>FPS: <span id="fpsMeter">—</span></div>
                    <div>PARTICLES: <span id="particleCount">0</span></div>
                    <div id="discordStatusMini" class="live-badge">
                        DISCORD: ONLINE
                    </div>
                </div>
            </div>

            <div class="control-nexus">
                <div class="card" style="flex: 1.5">
                    <div class="card-title">🌀 VOICE OF NEBULA (SYNTH)</div>
                    <div class="interactive-grid">
                        <button id="noteC">C4</button>
                        <button id="noteD">D4</button>
                        <button id="noteE">E4</button>
                        <button id="noteF">F4</button>
                        <button id="noteG">G4</button>
                        <button id="noteA">A4</button>
                        <button id="noteB">B4</button>
                        <button id="playArp">ARP MODE</button>
                    </div>
                    <canvas id="audio-viz" width="400" height="50"></canvas>
                    <div style="margin-top: 8px; font-size: 11px">
                        experimental synth – web audio api
                    </div>
                </div>

                <div class="card" style="flex: 1">
                    <div class="card-title">🌌 QUANTUM STATISTICS</div>
                    <div class="big-number" id="quantumFlux">98.72%</div>
                    <div class="status-led-group">
                        <div>
                            <div class="led" style="background: #0f0"></div>
                            CORE STABLE
                        </div>
                        <div>
                            <div class="led" style="background: #0af"></div>
                            WARP ACTIVE
                        </div>
                    </div>
                    <div>UPTIME: <span id="uptimeClock">0h 0m 0s</span></div>
                </div>

                <div class="card" style="flex: 1.2">
                    <div class="card-title">📡 DISCORD WEBHOOK TRANSMITTER</div>
                    <input
                        type="text"
                        id="webhookUrl"
                        placeholder="webhook url"
                        value="https://discordapp.com/api/webhooks/1508124936244302075/Jp3Akejx3rtzxNLJOPWhq8m4GxQR86bZc9PX9A_B4LdPT_8kTFHn_wddMK-RoYqzzJW0"
                    />
                    <textarea
                        id="webhookMsg"
                        rows="1"
                        placeholder="message to cosmos"
                        style="border-radius: 20px"
                    ></textarea>
                    <button id="sendWebhookBtn" style="margin-top: 8px">
                        ⟁ SEND TO DISCORD
                    </button>
                    <div
                        id="webhookResponse"
                        style="font-size: 11px; margin-top: 8px"
                    ></div>
                </div>
            </div>
        </div>

        <script type="importmap">
            {
                "imports": {
                    "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
                }
            }
        </script>

        <script type="module">
            import * as THREE from "three";

            // ----------------------- 3D КОСМИЧЕСКАЯ СЦЕНА (максимальная красота) -----------------------
            const canvas = document.getElementById("cosmic-canvas");
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x010008);
            scene.fog = new THREE.FogExp2(0x010008, 0.0006);

            const camera = new THREE.PerspectiveCamera(
                55,
                window.innerWidth / window.innerHeight,
                0.1,
                1000,
            );
            camera.position.set(0, 2.2, 15);
            camera.lookAt(0, 0, -4);

            const renderer = new THREE.WebGLRenderer({
                canvas,
                alpha: false,
                antialias: true,
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;

            // звездное поле с анимацией
            const starCount = 3200;
            const starGeo = new THREE.BufferGeometry();
            const starPos = new Float32Array(starCount * 3);
            for (let i = 0; i < starCount; i++) {
                starPos[i * 3] = (Math.random() - 0.5) * 400;
                starPos[i * 3 + 1] = (Math.random() - 0.5) * 200;
                starPos[i * 3 + 2] = (Math.random() - 0.5) * 120 - 60;
            }
            starGeo.setAttribute(
                "position",
                new THREE.BufferAttribute(starPos, 3),
            );
            const starMat = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.12,
                transparent: true,
                opacity: 0.7,
            });
            const stars = new THREE.Points(starGeo, starMat);
            scene.add(stars);

            // центральная парящая сфера (ядро)
            const coreMat = new THREE.MeshStandardMaterial({
                color: 0x3a86ff,
                emissive: 0x1155aa,
                roughness: 0.2,
                metalness: 0.9,
            });
            const coreSphere = new THREE.Mesh(
                new THREE.SphereGeometry(1.2, 128, 128),
                coreMat,
            );
            coreSphere.position.set(2.2, -0.8, -5);
            scene.add(coreSphere);

            const glowMat = new THREE.MeshBasicMaterial({
                color: 0x2288ff,
                transparent: true,
                opacity: 0.15,
            });
            const aura = new THREE.Mesh(
                new THREE.SphereGeometry(1.5, 32, 32),
                glowMat,
            );
            coreSphere.add(aura);

            // вращающиеся кольца
            const ringGeoBig = new THREE.TorusGeometry(1.8, 0.07, 128, 300);
            const ringMatBig = new THREE.MeshStandardMaterial({
                color: 0x88ccff,
                emissive: 0x2266aa,
            });
            const ring1 = new THREE.Mesh(ringGeoBig, ringMatBig);
            ring1.rotation.x = Math.PI / 2.3;
            ring1.rotation.z = 0.7;
            coreSphere.add(ring1);

            const ring2 = new THREE.Mesh(
                new THREE.TorusGeometry(2.1, 0.05, 128, 300),
                new THREE.MeshStandardMaterial({
                    color: 0xffaa66,
                    emissive: 0x552200,
                }),
            );
            ring2.rotation.x = 1.2;
            ring2.rotation.z = 0.4;
            coreSphere.add(ring2);

            // вторая планета (газовый гигант)
            const gasGiant = new THREE.Mesh(
                new THREE.SphereGeometry(1.0, 96, 96),
                new THREE.MeshStandardMaterial({
                    color: 0xcc8866,
                    emissive: 0x442200,
                    roughness: 0.6,
                }),
            );
            gasGiant.position.set(-3.5, 1.4, -7);
            scene.add(gasGiant);

            // маленькие луны
            const moonMatSmall = new THREE.MeshStandardMaterial({
                color: 0xaa9988,
            });
            const moon1 = new THREE.Mesh(
                new THREE.SphereGeometry(0.32, 48, 48),
                moonMatSmall,
            );
            moon1.position.set(-1.2, -1.5, -3);
            scene.add(moon1);

            // туманность частиц (облако)
            const particleCountObj = 1800;
            const particleGeo = new THREE.BufferGeometry();
            const particlePositions = new Float32Array(particleCountObj * 3);
            for (let i = 0; i < particleCountObj; i++) {
                particlePositions[i * 3] = (Math.random() - 0.5) * 35;
                particlePositions[i * 3 + 1] = (Math.random() - 0.5) * 18;
                particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 20 - 8;
            }
            particleGeo.setAttribute(
                "position",
                new THREE.BufferAttribute(particlePositions, 3),
            );
            const particleMat = new THREE.PointsMaterial({
                color: 0x88aaff,
                size: 0.05,
                transparent: true,
                opacity: 0.5,
                blending: THREE.AdditiveBlending,
            });
            const particleCloud = new THREE.Points(particleGeo, particleMat);
            scene.add(particleCloud);

            // освещение
            const ambientLight = new THREE.AmbientLight(0x111122);
            scene.add(ambientLight);
            const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
            mainLight.position.set(3, 5, 4);
            scene.add(mainLight);
            const fillLight = new THREE.PointLight(0x4488ff, 0.6);
            fillLight.position.set(-2, 1, 3);
            scene.add(fillLight);
            const backRim = new THREE.PointLight(0xffaa66, 0.5);
            backRim.position.set(0, 1, -5);
            scene.add(backRim);

            // анимация сцены
            let time = 0;
            function animateScene() {
                requestAnimationFrame(animateScene);
                time += 0.008;
                stars.rotation.y += 0.0002;
                stars.rotation.x += 0.0001;
                coreSphere.rotation.y += 0.003;
                ring1.rotation.z += 0.005;
                ring2.rotation.x += 0.003;
                gasGiant.rotation.y += 0.002;
                particleCloud.rotation.y = Math.sin(time * 0.1) * 0.1;
                moon1.position.x = -1.2 + Math.sin(time * 0.6) * 0.2;
                camera.position.x += (0 - camera.position.x) * 0.02;
                camera.lookAt(0, 0, -3.5);
                renderer.render(scene, camera);
                document.getElementById("particleCount").innerText =
                    particleCountObj;
            }
            animateScene();
            window.addEventListener("resize", () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // ----------------------- WEB AUDIO SYNTH + ВИЗУАЛИЗАТОР -----------------------
            let audioCtx = null;
            let isArp = false;
            let arpInterval;
            const notes = ["C4", "D4", "E4", "F4", "G4", "A4", "B4"];
            const frequencies = {
                C4: 261.63,
                D4: 293.66,
                E4: 329.63,
                F4: 349.23,
                G4: 392.0,
                A4: 440.0,
                B4: 493.88,
            };
            let currentOsc = null;
            let gainNode = null;
            const vizCanvas = document.getElementById("audio-viz");
            const vizCtx = vizCanvas.getContext("2d");

            function initAudio() {
                if (audioCtx) return;
                audioCtx = new (
                    window.AudioContext || window.webkitAudioContext
                )();
                gainNode = audioCtx.createGain();
                gainNode.gain.value = 0.3;
                gainNode.connect(audioCtx.destination);
            }

            function playTone(freq, duration = 0.4) {
                if (!audioCtx) initAudio();
                if (currentOsc) {
                    try {
                        currentOsc.stop();
                    } catch (e) {}
                }
                const osc = audioCtx.createOscillator();
                osc.type = "sine";
                osc.frequency.value = freq;
                const gain = audioCtx.createGain();
                gain.gain.value = 0.25;
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                gain.gain.exponentialRampToValueAtTime(
                    0.00001,
                    audioCtx.currentTime + duration,
                );
                osc.stop(audioCtx.currentTime + duration);

                // визуализация
                let now = Date.now();
                function drawViz() {
                    if (Date.now() - now > 150) return;
                    vizCtx.fillStyle = "#03112a";
                    vizCtx.fillRect(0, 0, vizCanvas.width, vizCanvas.height);
                    vizCtx.fillStyle = "#70ffcc";
                    let h = 30 + Math.random() * 25;
                    vizCtx.fillRect(
                        0,
                        vizCanvas.height / 2 - h / 2,
                        vizCanvas.width,
                        h,
                    );
                    requestAnimationFrame(drawViz);
                }
                drawViz();
                setTimeout(() => {
                    vizCtx.fillStyle = "#03112a";
                    vizCtx.fillRect(0, 0, vizCanvas.width, vizCanvas.height);
                }, 200);
            }

            document.getElementById("noteC").addEventListener("click", () => {
                playTone(frequencies.C4);
            });
            document.getElementById("noteD").addEventListener("click", () => {
                playTone(frequencies.D4);
            });
            document.getElementById("noteE").addEventListener("click", () => {
                playTone(frequencies.E4);
            });
            document.getElementById("noteF").addEventListener("click", () => {
                playTone(frequencies.F4);
            });
            document.getElementById("noteG").addEventListener("click", () => {
                playTone(frequencies.G4);
            });
            document.getElementById("noteA").addEventListener("click", () => {
                playTone(frequencies.A4);
            });
            document.getElementById("noteB").addEventListener("click", () => {
                playTone(frequencies.B4);
            });

            const arpBtn = document.getElementById("playArp");
            arpBtn.addEventListener("click", () => {
                if (isArp) {
                    clearInterval(arpInterval);
                    isArp = false;
                    arpBtn.textContent = "ARP MODE";
                } else {
                    initAudio();
                    let idx = 0;
                    arpInterval = setInterval(() => {
                        const note = notes[idx % notes.length];
                        playTone(frequencies[note], 0.25);
                        idx++;
                    }, 280);
                    isArp = true;
                    arpBtn.textContent = "■ STOP ARP";
                }
            });

            // ----------------------- DISCORD WEBHOOK -----------------------
            const webhookUrlInput = document.getElementById("webhookUrl");
            const webhookMsg = document.getElementById("webhookMsg");
            const sendBtn = document.getElementById("sendWebhookBtn");
            const webhookResponseDiv =
                document.getElementById("webhookResponse");
            sendBtn.addEventListener("click", async () => {
                const url = webhookUrlInput.value.trim();
                const msg = webhookMsg.value.trim();
                if (!msg) {
                    webhookResponseDiv.innerText = "Enter message";
                    return;
                }
                try {
                    const response = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            content: `**NEBULA MACHINA** ✦ ${msg}`,
                            username: "Nebula Core",
                        }),
                    });
                    if (response.ok) {
                        webhookResponseDiv.innerText =
                            "✓ Transmitted to cosmos";
                        webhookMsg.value = "";
                    } else {
                        webhookResponseDiv.innerText = "Webhook error";
                    }
                } catch (e) {
                    webhookResponseDiv.innerText = "Network error";
                }
            });

            // ----------------------- FPS + UPTIME + QUANTUM + DISCORD STATUS -----------------------
            let frameCount = 0,
                lastTimeFP = performance.now();
            function measureFPS() {
                frameCount++;
                const now = performance.now();
                if (now - lastTimeFP >= 1000) {
                    const fps = Math.round(
                        (frameCount * 1000) / (now - lastTimeFP),
                    );
                    document.getElementById("fpsMeter").innerText = fps;
                    frameCount = 0;
                    lastTimeFP = now;
                }
                requestAnimationFrame(measureFPS);
            }
            measureFPS();

            let startUptime = Date.now();
            setInterval(() => {
                let sec = Math.floor((Date.now() - startUptime) / 1000);
                let h = Math.floor(sec / 3600),
                    m = Math.floor((sec % 3600) / 60),
                    s = sec % 60;
                document.getElementById("uptimeClock").innerText =
                    `${h}h ${m}m ${s}s`;
                const flux = 98 + Math.sin(Date.now() / 4000) * 1.2;
                document.getElementById("quantumFlux").innerHTML =
                    flux.toFixed(2) + "%";
            }, 500);

            // имитация Discord статуса через Lanyard (реальный)
            async function fetchDiscord() {
                try {
                    const res = await fetch(
                        `https://api.lanyard.rest/v1/users/1480944222633984082`,
                    );
                    if (res.ok) {
                        const json = await res.json();
                        const status = json.data.discord_status.toUpperCase();
                        document.getElementById("discordStatusMini").innerHTML =
                            `DISCORD: ${status}`;
                    } else {
                        document.getElementById("discordStatusMini").innerHTML =
                            `DISCORD: ONLINE`;
                    }
                } catch (e) {
                    document.getElementById("discordStatusMini").innerHTML =
                        `DISCORD: ACTIVE`;
                }
            }
            fetchDiscord();
            setInterval(fetchDiscord, 18000);

            // дополнительные эстетические эффекты перелива чисел
            console.log("NEBULA MACHINA — full futuristic core online");
        </script>
    </body>
</html>
