<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Моё первое приложение</title>
        <style>
            /* Настройки для всего экрана (делаем темный фон и центрируем карточку) */
            body {
                margin: 0;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                background-color: #121214;
                font-family: sans-serif;
                color: #ffffff;
            }

            /* Стиль для нашей карточки */
            .card {
                background-color: #202024;
                padding: 30px;
                border-radius: 12px;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
                text-align: center;
                max-width: 400px;
                width: 100%;
            }

            /* Стиль текста */
            #quote-text {
                font-size: 1.2rem;
                line-height: 1.5;
                margin-bottom: 25px;
                min-height: 60px; /* Чтобы карточка не прыгала от разной длины текста */
            }

            /* Стиль интерактивной кнопки */
            #quote-btn {
                background-color: #8257e5;
                color: white;
                border: none;
                padding: 12px 24px;
                font-size: 1rem;
                border-radius: 6px;
                cursor: pointer;
                transition: background 0.2s;
            }

            /* Эффект при наведении мыши на кнопку */
            #quote-btn:hover {
                background-color: #9466ff;
            }
        </style>
    </head>
    <body>
        <!-- Карточка по центру экрана -->
        <div class="card">
            <p id="quote-text">
                Нажмите кнопку, чтобы получить предсказание на сегодня!
            </p>
            <button id="quote-btn">Получить</button>
        </div>
        <script>
            // 1. Создаем массив (список) фраз, которые будут меняться
            const phrases = [
                "Код работает? Не трогай.",
                "Сегодня идеальный день, чтобы завалить прод.",
                "Ошибки в консоли — это просто мнение твоего компьютера.",
                "Семь раз отмерь, один раз закомить.",
                "Фронтенд — это искусство делать красиво там, где сзади всё держится на костылях.",
            ];

            // 2. Находим элементы на странице по их ID, чтобы JS мог ими управлять
            const textElement = document.getElementById("quote-text");
            const buttonElement = document.getElementById("quote-btn");

            // 3. Создаем функцию, которая выбирает случайную фразу и вставляет её в текст
            function changeQuote() {
                // Магия математики: выбираем случайный индекс из нашего списка фраз
                const randomIndex = Math.floor(Math.random() * phrases.length);

                // Меняем текст на экране на случайную фразу
                textElement.textContent = phrases[randomIndex];
            }

            // 4. Говорим кнопке: «Слушай клик мыши. Как только кликнут — запускай функцию changeQuote»
            buttonElement.addEventListener("click", changeQuote);
        </script>
    </body>
</html>
